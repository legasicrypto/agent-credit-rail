app = 'legasi-orchestrator'
primary_region = 'cdg'

[build]
  dockerfile = '../../Dockerfile'
  [build.args]
    APP_ENTRYPOINT = 'apps/legasi-orchestrator/src/main.ts'
    PORT = '4010'

[env]
  ORCHESTRATOR_PORT = '4010'

[http_service]
  internal_port = 4010
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

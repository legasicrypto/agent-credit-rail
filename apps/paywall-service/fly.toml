app = 'legasi-paywall'
primary_region = 'cdg'

[build]
  dockerfile = '../../Dockerfile'
  [build.args]
    APP_ENTRYPOINT = 'apps/paywall-service/src/main.ts'
    PORT = '4020'

[env]
  PAYWALL_PORT = '4020'
  STELLAR_NETWORK = 'stellar:testnet'
  FACILITATOR_URL = 'https://x402.org/facilitator'

[http_service]
  internal_port = 4020
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
